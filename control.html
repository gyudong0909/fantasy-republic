<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판타지 공화국 — 컨트롤러</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0a0a0f; color: #e0e0e0;
      height: 100vh; display: flex; flex-direction: column;
    }

    /* 상단 바 */
    .ctrl-top {
      background: #0e0e18; border-bottom: 1px solid #1a1a2e;
      padding: 10px 16px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .ctrl-top .logo { font-weight: 900; font-size: 13px; color: #f0c040; }
    .ctrl-top .actions { display: flex; gap: 6px; }
    .ctrl-top button {
      background: #1a1a2e; border: 1px solid #2a2a3e; color: #888;
      padding: 5px 12px; border-radius: 6px; font-size: 11px;
      cursor: pointer; font-family: inherit;
    }
    .ctrl-top button:hover { border-color: #f0c040; color: #f0c040; }
    .ctrl-top button.active-btn { background: #f0c040; color: #000; border-color: #f0c040; }

    /* 라운드 탭 */
    .round-tabs {
      background: #0e0e18; border-bottom: 1px solid #1a1a2e;
      padding: 6px 16px; display: flex; gap: 4px;
      overflow-x: auto; flex-shrink: 0;
    }
    .rtab {
      background: none; border: 1px solid #1e1e30; color: #555;
      padding: 4px 12px; border-radius: 14px; font-size: 11px;
      cursor: pointer; white-space: nowrap; font-family: inherit;
    }
    .rtab:hover { color: #aaa; }
    .rtab.active { background: rgba(240,192,64,0.1); color: #f0c040; border-color: rgba(240,192,64,0.3); }

    /* 메인 영역 */
    .ctrl-main {
      flex: 1; display: flex; overflow: hidden;
    }

    /* 대사 목록 (왼쪽) */
    .cue-list {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      border-right: 1px solid #1a1a2e;
    }
    .cue {
      padding: 12px 14px; margin: 4px 0;
      background: #12121c; border: 1px solid #1e1e30;
      border-radius: 8px; cursor: pointer;
      transition: all 0.2s; font-size: 13px;
    }
    .cue:hover { border-color: #333; }
    .cue.active-cue {
      border-color: #f0c040; background: rgba(240,192,64,0.05);
    }
    .cue.sent { opacity: 0.4; }
    .cue-speaker {
      font-size: 10px; font-weight: 700; margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .cue-speaker.narr { color: #f0c040; }
    .cue-speaker.sys { color: #6ab0ff; }
    .cue-speaker.dir { color: #555; }
    .cue-speaker.junhyuk { color: #6ab0ff; }
    .cue-speaker.sangrin { color: #6aff9a; }
    .cue-speaker.yeonwoo { color: #d06aff; }
    .cue-speaker.vip { color: #ffd700; }
    .cue-speaker.squid { color: #ff2d78; }
    .cue-preview { color: #888; font-size: 12px; line-height: 1.6; }
    .cue-memo { color: #444; font-size: 11px; margin-top: 4px; font-style: italic; }

    /* 오른쪽 패널 */
    .side-panel {
      width: 280px; flex-shrink: 0;
      display: flex; flex-direction: column;
      padding: 16px; overflow-y: auto;
    }
    .panel-section {
      margin-bottom: 20px;
    }
    .panel-title {
      font-size: 11px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* 현재 표시중 미리보기 */
    .preview-box {
      background: #000; border: 1px solid #1a1a2e;
      border-radius: 8px; padding: 16px;
      font-size: 12px; color: #aaa; line-height: 1.6;
      min-height: 100px;
    }
    .preview-box em { color: #f0c040; font-style: normal; font-weight: 700; }

    /* 타이머 */
    .timer-display {
      font-size: 48px; font-weight: 900; color: #f0c040;
      text-align: center; font-variant-numeric: tabular-nums;
    }
    .timer-controls { display: flex; gap: 6px; margin-top: 8px; }
    .timer-btn {
      flex: 1; padding: 8px; border-radius: 6px;
      border: 1px solid #2a2a3e; background: #1a1a2e;
      color: #888; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }
    .timer-btn:hover { border-color: #f0c040; color: #f0c040; }

    /* 하단 컨트롤 */
    .ctrl-bottom {
      background: #0e0e18; border-top: 1px solid #1a1a2e;
      padding: 12px 16px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .big-btn {
      padding: 12px 32px; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.2s;
    }
    .big-btn.prev-btn {
      background: none; border: 1px solid #333; color: #888;
    }
    .big-btn.prev-btn:hover { border-color: #f0c040; color: #f0c040; }
    .big-btn.next-btn {
      background: #f0c040; border: none; color: #000;
    }
    .big-btn.next-btn:hover { background: #ffd060; }
    .big-btn:disabled { opacity: 0.3; cursor: default; }
    .pos-indicator { color: #444; font-size: 13px; font-weight: 700; }

    /* 키보드 힌트 */
    .key-hints {
      position: fixed; bottom: 70px; right: 16px;
      color: #222; font-size: 10px; text-align: right;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- 상단 -->
<div class="ctrl-top">
  <span class="logo">컨트롤러</span>
  <div class="actions">
    <button onclick="openPresent()" id="presentBtn">프레젠테이션 창 열기</button>
    <button onclick="sendBlack()">화면 끄기</button>
    <a href="index.html" style="color:#555; text-decoration:none; font-size:11px; padding:5px 12px;">메인</a>
  </div>
</div>

<!-- 라운드 탭 -->
<div class="round-tabs" id="roundTabs"></div>

<!-- 메인 -->
<div class="ctrl-main">
  <!-- 대사 목록 -->
  <div class="cue-list" id="cueList"></div>

  <!-- 사이드 패널 -->
  <div class="side-panel">
    <div class="panel-section">
      <div class="panel-title">현재 화면</div>
      <div class="preview-box" id="previewBox">
        프레젠테이션 창을 열고 대사를 클릭하세요
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">타이머</div>
      <div class="timer-display" id="timerDisplay">5:00</div>
      <div class="timer-controls">
        <button class="timer-btn" onclick="startTimer(180)">3분</button>
        <button class="timer-btn" onclick="startTimer(300)">5분</button>
        <button class="timer-btn" onclick="stopTimer()">정지</button>
        <button class="timer-btn" onclick="resetTimer()">리셋</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">단축키</div>
      <div style="font-size:11px; color:#444; line-height:2;">
        <b style="color:#888;">→ Space</b> 다음 대사<br>
        <b style="color:#888;">←</b> 이전 대사<br>
        <b style="color:#888;">B</b> 화면 끄기<br>
        <b style="color:#888;">T</b> 5분 타이머<br>
        <b style="color:#888;">S</b> 타이머 정지
      </div>
    </div>
  </div>
</div>

<!-- 하단 -->
<div class="ctrl-bottom">
  <button class="big-btn prev-btn" id="prevBtn" onclick="goCue(currentCue-1)">← 이전</button>
  <span class="pos-indicator" id="posIndicator"></span>
  <button class="big-btn next-btn" id="nextBtn" onclick="goCue(currentCue+1)">다음 →</button>
</div>

const ROUNDS = ['프롤로그','1R 선거','2R 주식','3R 경마','4R 도박','5R 탄핵','6R~ 후반','최종'];

// ═══ 채널 ═══
const ch = new BroadcastChannel('fantasy-republic');
let currentCue = 0;
let currentRound = 0;

// ═══ 라운드 탭 생성 ═══
const tabsEl = document.getElementById('roundTabs');
ROUNDS.forEach((name, i) => {
  const btn = document.createElement('button');
  btn.className = 'rtab' + (i === 0 ? ' active' : '');
  btn.textContent = name;
  btn.onclick = () => {
    const first = SCRIPT.findIndex(s => s.roundIdx === i);
    if (first >= 0) goCue(first);
  };
  tabsEl.appendChild(btn);
});

// ═══ 큐 목록 생성 ═══
const cueListEl = document.getElementById('cueList');
SCRIPT.forEach((cue, i) => {
  const div = document.createElement('div');
  div.className = 'cue';
  div.dataset.index = i;

  const sp = document.createElement('div');
  sp.className = 'cue-speaker ' + cue.cls;
  sp.textContent = cue.speaker;

  const preview = document.createElement('div');
  preview.className = 'cue-preview';
  preview.textContent = cue.html.replace(/<[^>]+>/g, ' ').substring(0, 80) + '…';

  div.appendChild(sp);
  div.appendChild(preview);

  if (cue.memo) {
    const memo = document.createElement('div');
    memo.className = 'cue-memo';
    memo.textContent = cue.memo;
    div.appendChild(memo);
  }

  div.onclick = () => goCue(i);
  cueListEl.appendChild(div);
});

// ═══ 큐 이동 ═══
function goCue(i) {
  if (i < 0 || i >= SCRIPT.length) return;

  // 이전 큐 스타일
  const allCues = cueListEl.querySelectorAll('.cue');
  allCues.forEach((c, idx) => {
    c.classList.remove('active-cue');
    c.classList.toggle('sent', idx < i);
  });

  currentCue = i;
  const cue = SCRIPT[i];

  // 현재 큐 하이라이트
  allCues[i].classList.add('active-cue');
  allCues[i].scrollIntoView({ behavior: 'smooth', block: 'center' });

  // 라운드 탭 업데이트
  if (cue.roundIdx !== currentRound) {
    currentRound = cue.roundIdx;
    tabsEl.querySelectorAll('.rtab').forEach((t, idx) => {
      t.classList.toggle('active', idx === currentRound);
    });
  }

  // 프레젠테이션으로 전송
  ch.postMessage({
    type: 'show',
    data: {
      round: cue.round,
      speaker: cue.speaker,
      speakerClass: cue.cls,
      html: cue.html,
      isCandidate: cue.isCandidate || false,
      progress: ((i + 1) / SCRIPT.length) * 100
    }
  });

  // 미리보기
  document.getElementById('previewBox').innerHTML = cue.html;

  // 위치 표시
  document.getElementById('posIndicator').textContent = (i + 1) + ' / ' + SCRIPT.length;
  document.getElementById('prevBtn').disabled = i === 0;
  document.getElementById('nextBtn').disabled = i === SCRIPT.length - 1;
}

function sendBlack() {
  ch.postMessage({ type: 'black' });
  document.getElementById('previewBox').innerHTML = '<span style="color:#333;">화면 꺼짐</span>';
}

function openPresent() {
  window.open('present.html', 'present', 'width=1280,height=720');
  document.getElementById('presentBtn').textContent = '프레젠테이션 창 열림';
  document.getElementById('presentBtn').classList.add('active-btn');
}

// ═══ 타이머 ═══
let timerInterval = null;
let timerSeconds = 300;

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent =
    m + ':' + String(s).padStart(2, '0');
  if (timerSeconds <= 10) {
    document.getElementById('timerDisplay').style.color = '#ff4444';
  } else {
    document.getElementById('timerDisplay').style.color = '#f0c040';
  }
}

function startTimer(sec) {
  stopTimer();
  timerSeconds = sec;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) { stopTimer(); }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function resetTimer() {
  stopTimer();
  timerSeconds = 300;
  updateTimerDisplay();
}

// ═══ 키보드 ═══
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goCue(currentCue + 1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goCue(currentCue - 1); }
  if (e.key === 'b' || e.key === 'B') { sendBlack(); }
  if (e.key === 't' || e.key === 'T') { startTimer(300); }
  if (e.key === 's' || e.key === 'S') { stopTimer(); }
});

// 초기화
updateTimerDisplay();
