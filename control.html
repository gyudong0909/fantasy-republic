<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판타지 공화국 — 컨트롤러</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#0a0a0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* TOP BAR */
.top{background:#0e0e18;border-bottom:1px solid #1a1a2e;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top .logo{font-weight:900;font-size:13px;color:#f0c040}
.top .acts{display:flex;gap:6px;align-items:center}
.btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#888;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
.btn:hover{border-color:#f0c040;color:#f0c040}
.btn.on{background:#f0c040;color:#000;border-color:#f0c040}
.btn.danger{border-color:#ff4444;color:#ff4444}
.btn.danger:hover{background:#ff4444;color:#fff}

/* MAIN TABS */
.tabs{background:#0e0e18;border-bottom:1px solid #1a1a2e;padding:4px 16px;display:flex;gap:2px;flex-shrink:0}
.tab{background:none;border:none;color:#444;padding:6px 14px;border-radius:8px 8px 0 0;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;border-bottom:2px solid transparent}
.tab:hover{color:#888}
.tab.active{color:#f0c040;border-bottom-color:#f0c040;background:rgba(240,192,64,0.05)}

/* LAYOUT */
.layout{flex:1;display:flex;overflow:hidden}
.main-area{flex:1;overflow-y:auto;padding:16px}
.side{width:280px;flex-shrink:0;border-left:1px solid #1a1a2e;display:flex;flex-direction:column;overflow-y:auto;padding:12px}
.tab-content{display:none}
.tab-content.active{display:block}

/* SIDE SECTIONS */
.side-title{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px}
.side-title:first-child{margin-top:0}
.preview-box{background:#000;border:1px solid #1a1a2e;border-radius:6px;padding:12px;font-size:11px;color:#888;line-height:1.5;min-height:60px;max-height:100px;overflow:auto}
.preview-box em{color:#f0c040;font-style:normal;font-weight:700}

/* TIMER */
.timer-big{font-size:36px;font-weight:900;color:#f0c040;text-align:center;font-variant-numeric:tabular-nums}
.timer-big.urgent{color:#ff4444}
.timer-btns{display:flex;gap:4px;margin-top:6px}
.timer-btns .btn{flex:1;text-align:center}

/* PRESENT MODE */
.mode-btns{display:flex;flex-wrap:wrap;gap:4px}
.mode-btn{flex:1;min-width:70px;padding:5px 4px;border-radius:6px;border:1px solid #1e1e30;background:none;color:#555;font-size:10px;cursor:pointer;font-family:inherit;text-align:center}
.mode-btn:hover{color:#aaa;border-color:#333}
.mode-btn.active{color:#f0c040;border-color:#f0c040;background:rgba(240,192,64,0.05)}

/* MINI SCOREBOARD */
.mini-sb{font-size:11px}
.mini-sb-row{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid #111}
.mini-sb-rank{color:#f0c040;font-weight:900;width:16px}
.mini-sb-name{flex:1;color:#888}
.mini-sb-gold{font-weight:700;color:#f0c040}
.mini-sb-gold.neg{color:#ff2d78}

/* CARDS */
.card{background:#12121c;border:1px solid #1e1e30;border-radius:8px;padding:16px;margin:8px 0}
.card h3{font-size:14px;font-weight:700;color:#f0c040;margin-bottom:10px}

/* FORMS */
select,input[type=text],input[type=number]{background:#0e0e18;border:1px solid #2a2a3e;color:#eee;padding:6px 10px;border-radius:6px;font-size:12px;font-family:inherit}
select:focus,input:focus{outline:none;border-color:#f0c040}
label{font-size:11px;color:#666;display:block;margin:6px 0 3px}
.form-row{display:flex;gap:8px;align-items:flex-end;margin:6px 0}
.form-row > *{flex:1}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#0e0e18;color:#f0c040;font-weight:700;padding:8px;text-align:left;border-bottom:1px solid #1e1e30;position:sticky;top:0}
.tbl td{padding:6px 8px;border-bottom:1px solid #111}
.tbl tr:hover td{background:rgba(240,192,64,0.02)}
.tbl .r{text-align:right}
.tbl .gold{color:#f0c040;font-weight:700}
.tbl .neg{color:#ff2d78}
.tbl .party-j{color:#6ab0ff} .tbl .party-s{color:#6aff9a} .tbl .party-y{color:#d06aff}

/* CUE LIST */
.cue{padding:10px 12px;margin:3px 0;background:#12121c;border:1px solid #1e1e30;border-radius:6px;cursor:pointer;font-size:12px}
.cue:hover{border-color:#333}
.cue.active-cue{border-color:#f0c040;background:rgba(240,192,64,0.05)}
.cue.sent{opacity:0.3}
.cue-sp{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.cue-sp.narr{color:#f0c040}.cue-sp.sys{color:#6ab0ff}.cue-sp.dir{color:#555}
.cue-sp.junhyuk{color:#6ab0ff}.cue-sp.sangrin{color:#6aff9a}.cue-sp.yeonwoo{color:#d06aff}
.cue-sp.vip{color:#ffd700}.cue-sp.squid{color:#ff2d78}
.cue-pv{color:#666;font-size:11px}
.cue-memo{color:#333;font-size:10px;margin-top:3px;font-style:italic}

/* ROUND TABS */
.rtabs{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
.rtab{background:none;border:1px solid #1e1e30;color:#444;padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer;font-family:inherit}
.rtab:hover{color:#888}
.rtab.active{color:#f0c040;border-color:rgba(240,192,64,0.3);background:rgba(240,192,64,0.05)}

/* VOTE */
.vote-bar-o{height:24px;background:#1a1a2e;border-radius:6px;overflow:hidden;flex:1}
.vote-bar-i{height:100%;border-radius:6px;transition:width 0.5s}

/* LOG */
.log{max-height:200px;overflow-y:auto;font-size:11px;color:#555;line-height:1.8}
.log-entry{border-bottom:1px solid #0e0e18;padding:2px 0}

/* BOTTOM */
.bottom{background:#0e0e18;border-top:1px solid #1a1a2e;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.big-btn{padding:10px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.big-btn.prev{background:none;border:1px solid #333;color:#888}
.big-btn.prev:hover{border-color:#f0c040;color:#f0c040}
.big-btn.next{background:#f0c040;border:none;color:#000}
.big-btn.next:hover{background:#ffd060}
.big-btn:disabled{opacity:0.2;cursor:default}
.pos{color:#444;font-size:12px;font-weight:700}
</style>
</head>
<body>

<div class="top">
  <span class="logo">🎮 컨트롤러 — 판타지 공화국</span>
  <div class="acts">
    <button class="btn" onclick="openPresent()" id="presentBtn">프레젠테이션 창 열기</button>
    <button class="btn" onclick="sendBlack()">화면 끄기</button>
    <button class="btn" onclick="exportState()">저장</button>
    <button class="btn" onclick="importState()">불러오기</button>
    <button class="btn danger" onclick="if(confirm('모든 데이터를 초기화합니다?')){localStorage.removeItem('fr-state');location.reload();}">리셋</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="tScript">📜 대본</button>
  <button class="tab" data-tab="tPlayers">👥 플레이어</button>
  <button class="tab" data-tab="tBank">🏦 은행</button>
  <button class="tab" data-tab="tStocks">📈 주식</button>
  <button class="tab" data-tab="tVote">🗳️ 투표</button>
  <button class="tab" data-tab="tBet">🎰 베팅</button>
</div>

<div class="layout">
<div class="main-area">

<!-- ═══ TAB: SCRIPT ═══ -->
<div class="tab-content active" id="tScript">
  <div class="rtabs" id="rtabs"></div>
  <div id="cueList"></div>
</div>

<!-- ═══ TAB: PLAYERS ═══ -->
<div class="tab-content" id="tPlayers">
  <div class="card">
    <h3>플레이어 등록</h3>
    <div class="form-row">
      <div><label>이름</label><input type="text" id="pName" placeholder="이름 입력"></div>
      <div><label>당</label>
        <select id="pParty"><option value="">무소속</option><option value="강철방위당">⚔️ 강철방위당</option><option value="혁신개발당">🧪 혁신개발당</option><option value="암흑이익당">🕷️ 암흑이익당</option></select>
      </div>
      <div><label>&nbsp;</label><button class="btn" onclick="addPlayer()">추가</button></div>
    </div>
  </div>
  <div class="card">
    <h3>전원 작업</h3>
    <div class="form-row">
      <button class="btn" onclick="bulkGold(1000)">전원 1000G 지급</button>
      <button class="btn" onclick="bulkTax()">세금 일괄 징수</button>
      <button class="btn" onclick="bulkBonus()">1위 보너스 지급</button>
      <button class="btn" onclick="bulkInterest()">이자 일괄 적용</button>
      <button class="btn" onclick="bulkRedistribute()">재분배 (장연우)</button>
    </div>
  </div>
  <table class="tbl">
    <thead><tr><th>#</th><th>이름</th><th>당</th><th class="r">골드</th><th class="r">주식</th><th class="r">빚</th><th class="r">순자산</th><th>관리</th></tr></thead>
    <tbody id="playerTable"></tbody>
  </table>
</div>

<!-- ═══ TAB: BANK ═══ -->
<div class="tab-content" id="tBank">
  <div class="card">
    <h3>💰 대출</h3>
    <div class="form-row">
      <div><label>플레이어</label><select id="loanPlayer" onchange="updateLoanMax()"></select></div>
      <div><label>금액 (100G 단위)</label><input type="number" id="loanAmt" step="100" min="100"></div>
      <div><label>한도</label><span id="loanMax" style="color:#f0c040;font-weight:700">-</span></div>
      <div><label>&nbsp;</label><button class="btn" onclick="doLoan()">대출</button></div>
    </div>
  </div>
  <div class="card">
    <h3>💸 상환</h3>
    <div class="form-row">
      <div><label>플레이어</label><select id="repayPlayer" onchange="updateRepayInfo()"></select></div>
      <div><label>현재 빚</label><span id="repayDebt" style="color:#ff2d78;font-weight:700">-</span></div>
      <div><label>금액</label><input type="number" id="repayAmt" step="100" min="100"></div>
      <div><label>&nbsp;</label><button class="btn" onclick="doRepay()">상환</button></div>
    </div>
  </div>
  <div class="card">
    <h3>📤 이체</h3>
    <div class="form-row">
      <div><label>보내는 사람</label><select id="txFrom"></select></div>
      <div><label>받는 사람</label><select id="txTo"></select></div>
      <div><label>금액</label><input type="number" id="txAmt" step="100" min="100"></div>
      <div><label>&nbsp;</label><button class="btn" onclick="doTransfer()">이체</button></div>
    </div>
    <p style="font-size:11px;color:#555;margin-top:6px">수수료 5% (최소 10G). 장연우 당원 면제.</p>
  </div>
  <div class="card">
    <h3>거래 내역</h3>
    <div class="log" id="bankLog"></div>
  </div>
</div>

<!-- ═══ TAB: STOCKS ═══ -->
<div class="tab-content" id="tStocks">
  <div class="card">
    <h3>주가 설정</h3>
    <div class="form-row" style="margin-bottom:8px">
      <div><label>대통령</label>
        <select id="presidentSel" onchange="ST.president=this.value;save();renderStocks()">
          <option value="">미정</option>
          <option value="junhyuk">⚔️ 박준혁</option>
          <option value="sangrin">🧪 정상린</option>
          <option value="yeonwoo">🕷️ 장연우</option>
        </select>
      </div>
      <div><label>&nbsp;</label><button class="btn" onclick="applyStockChanges()">변동 적용</button></div>
      <div><label>&nbsp;</label><button class="btn" onclick="sendStocks()">주가 화면 표시</button></div>
    </div>
    <table class="tbl">
      <thead><tr><th>회사</th><th class="r">현재가</th><th class="r">변동(G)</th><th class="r">보정</th><th class="r">새 가격</th></tr></thead>
      <tbody id="stockTable"></tbody>
    </table>
  </div>
  <div class="card">
    <h3>매수 / 매도</h3>
    <div class="form-row">
      <div><label>플레이어</label><select id="tradePlayer"></select></div>
      <div><label>회사</label><select id="tradeCo"></select></div>
      <div><label>수량</label><input type="number" id="tradeQty" min="1" max="5" value="1"></div>
      <div><label>&nbsp;</label><button class="btn" onclick="doTrade('buy')">매수</button></div>
      <div><label>&nbsp;</label><button class="btn" onclick="doTrade('sell')">매도</button></div>
    </div>
  </div>
</div>

<!-- ═══ TAB: VOTE ═══ -->
<div class="tab-content" id="tVote">
  <div class="card">
    <h3>🗳️ 선거</h3>
    <div class="form-row">
      <button class="btn" onclick="addVote('junhyuk')">⚔️ 박준혁 +1</button>
      <button class="btn" onclick="addVote('sangrin')">🧪 정상린 +1</button>
      <button class="btn" onclick="addVote('yeonwoo')">🕷️ 장연우 +1</button>
      <button class="btn" onclick="addVote('abstain')">기권 +1</button>
      <button class="btn danger" onclick="resetVotes()">리셋</button>
      <button class="btn" onclick="sendVoteElection()">화면 표시</button>
    </div>
    <div id="voteDisplay" style="margin-top:12px"></div>
  </div>
  <div class="card">
    <h3>탄핵 투표</h3>
    <div class="form-row">
      <button class="btn" onclick="addImpeach('keep')">유지 +1</button>
      <button class="btn" onclick="addImpeach('remove')">탄핵 +1</button>
      <button class="btn danger" onclick="ST.impeachment={keep:0,remove:0};save();renderVote()">리셋</button>
      <button class="btn" onclick="sendVoteImpeach()">화면 표시</button>
    </div>
    <div id="impeachDisplay" style="margin-top:12px"></div>
  </div>
</div>

<!-- ═══ TAB: BETTING ═══ -->
<div class="tab-content" id="tBet">
  <div class="card">
    <h3>🏇 경마</h3>
    <div class="form-row">
      <div><label>플레이어</label><select id="hrPlayer"></select></div>
      <div><label>말</label><select id="hrHorse"><option value="1">1번 ×2</option><option value="2">2번 ×3</option><option value="3">3번 ×5</option><option value="4">4번 ×10</option></select></div>
      <div><label>베팅 (100~200G)</label><input type="number" id="hrAmt" min="100" max="200" step="100" value="100"></div>
      <div><label>&nbsp;</label><button class="btn" onclick="placeHorseBet()">베팅</button></div>
    </div>
    <div id="horseBets" style="margin-top:8px"></div>
    <div class="form-row" style="margin-top:12px">
      <div><label>우승 말</label><select id="hrWinner"><option value="1">1번</option><option value="2">2번</option><option value="3">3번</option><option value="4">4번</option></select></div>
      <div><label>&nbsp;</label><button class="btn on" onclick="settleHorse()">결과 정산</button></div>
      <div><label>&nbsp;</label><button class="btn" onclick="sendHorse()">화면 표시</button></div>
    </div>
  </div>
  <div class="card">
    <h3>🎰 홀짝</h3>
    <div class="form-row">
      <div><label>플레이어</label><select id="gePlayer"></select></div>
      <div><label>선택</label><select id="geChoice"><option value="odd">홀</option><option value="even">짝</option></select></div>
      <div><label>베팅 (100~500G)</label><input type="number" id="geAmt" min="100" max="500" step="100" value="100"></div>
      <div><label>결과</label><select id="geResult"><option value="odd">홀</option><option value="even">짝</option></select></div>
      <div><label>&nbsp;</label><button class="btn on" onclick="settleGamble()">정산</button></div>
    </div>
  </div>
  <div class="card">
    <h3>🎟️ 복권</h3>
    <div class="form-row">
      <div><label>플레이어</label><select id="lotPlayer"></select></div>
      <div><label>&nbsp;</label><button class="btn on" onclick="drawLottery()">복권 구매 & 추첨 (50G)</button></div>
    </div>
    <div id="lotResult" style="margin-top:8px;font-size:14px"></div>
  </div>
  <div class="card">
    <h3>베팅 내역</h3>
    <div class="log" id="betLog"></div>
  </div>
</div>

</div><!-- /main-area -->

<!-- SIDEBAR -->
<div class="side">
  <div class="side-title">프레젠테이션 모드</div>
  <div class="mode-btns">
    <button class="mode-btn active" data-mode="script" onclick="setMode('script')">대본</button>
    <button class="mode-btn" data-mode="timer" onclick="setMode('timer')">타이머</button>
    <button class="mode-btn" data-mode="scoreboard" onclick="setMode('scoreboard')">순위</button>
    <button class="mode-btn" data-mode="stocks" onclick="setMode('stocks')">주가</button>
    <button class="mode-btn" data-mode="vote" onclick="setMode('vote')">투표</button>
  </div>

  <div class="side-title">현재 화면</div>
  <div class="preview-box" id="previewBox">프레젠테이션 창을 열고 시작하세요</div>

  <div class="side-title">타이머</div>
  <div class="timer-big" id="timerDisp">5:00</div>
  <div class="timer-btns">
    <button class="btn" onclick="startTimer(120)">2분</button>
    <button class="btn" onclick="startTimer(180)">3분</button>
    <button class="btn" onclick="startTimer(300)">5분</button>
    <button class="btn" onclick="stopTimer()">정지</button>
  </div>

  <div class="side-title">순위</div>
  <div class="mini-sb" id="miniSb"></div>

  <div class="side-title" style="margin-top:16px">단축키</div>
  <div style="font-size:10px;color:#333;line-height:1.8">
    <b style="color:#666">→ Space</b> 다음 <b style="color:#666">←</b> 이전<br>
    <b style="color:#666">B</b> 화면끄기 <b style="color:#666">T</b> 5분타이머 <b style="color:#666">S</b> 정지
  </div>
</div>
</div><!-- /layout -->

<div class="bottom">
  <button class="big-btn prev" id="prevBtn" onclick="goCue(curCue-1)">← 이전</button>
  <span class="pos" id="posInd"></span>
  <button class="big-btn next" id="nextBtn" onclick="goCue(curCue+1)">다음 →</button>
</div>

<script>
// ═══════════════════════════════════════════
// [1] STATE & PERSISTENCE
// ═══════════════════════════════════════════
let ST = {
  round: 0, president: '',
  players: [],
  stocks: {
    '철벽건설':{price:200,history:[200],sector:'construction'},
    '레드포지':{price:200,history:[200],sector:'military'},
    '네오텍':{price:200,history:[200],sector:'tech'},
    '볼트에너지':{price:200,history:[200],sector:'energy'},
    '미라주엔터':{price:200,history:[200],sector:'entertainment'},
    '블랙마켓':{price:200,history:[200],sector:'blackmarket'},
  },
  votes:{junhyuk:0,sangrin:0,yeonwoo:0,abstain:0},
  impeachment:{keep:0,remove:0},
  horseBets:[], horseWinner:0,
  bankLog:[], betLog:[]
};
function save(){localStorage.setItem('fr-state',JSON.stringify(ST))}
function load(){const s=localStorage.getItem('fr-state');if(s)ST=JSON.parse(s)}
function exportState(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(ST,null,2)]));a.download='fantasy-republic-save.json';a.click()}
function importState(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;f.text().then(t=>{ST=JSON.parse(t);save();location.reload()})};i.click()}

// ═══════════════════════════════════════════
// [2] SCRIPT DATA

let curCue=0;
function buildCues(){
  const rt=document.getElementById('rtabs');
  rt.innerHTML=ROUNDS.map((n,i)=>`<button class="rtab${i===0?' active':''}" onclick="jumpRound(${i})">${n}</button>`).join('');
  const cl=document.getElementById('cueList');
  cl.innerHTML=SCRIPT.map((q,i)=>`<div class="cue" data-i="${i}" onclick="goCue(${i})"><div class="cue-sp ${q.c}">${q.sp}</div><div class="cue-pv">${q.h.replace(/<[^>]+>/g,' ').substring(0,70)}…</div>${q.m?'<div class="cue-memo">'+q.m+'</div>':''}</div>`).join('');
}
function goCue(i){
  if(i<0||i>=SCRIPT.length)return;
  const cues=document.querySelectorAll('.cue');
  cues.forEach((c,idx)=>{c.classList.remove('active-cue');c.classList.toggle('sent',idx<i)});
  curCue=i;cues[i].classList.add('active-cue');cues[i].scrollIntoView({behavior:'smooth',block:'center'});
  const q=SCRIPT[i];
  document.querySelectorAll('.rtab').forEach((t,idx)=>t.classList.toggle('active',idx===q.ri));
  if(presentMode==='script'){
    ch.postMessage({type:'show',data:{round:q.r,speaker:q.sp,speakerClass:q.c,html:q.h,progress:((i+1)/SCRIPT.length)*100}});
    document.getElementById('previewBox').innerHTML=q.h;
  }
  document.getElementById('posInd').textContent=(i+1)+' / '+SCRIPT.length;
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===SCRIPT.length-1;
}
function jumpRound(ri){const i=SCRIPT.findIndex(s=>s.ri===ri);if(i>=0)goCue(i)}

function netWorth(p){let sv=0;for(const[co,q] of Object.entries(p.stocks||{}))sv+=(ST.stocks[co]?.price||0)*q;return p.gold+sv-p.debt}
function addPlayer(){const n=document.getElementById('pName').value.trim();if(!n)return;const pa=document.getElementById('pParty').value;ST.players.push({id:Date.now(),name:n,gold:0,stocks:{},debt:0,party:pa});document.getElementById('pName').value='';save();renderPlayers()}
function bulkGold(amt){ST.players.forEach(p=>p.gold+=amt);save();renderPlayers();addBankLog('전원 '+amt+'G 지급')}
function bulkTax(){if(ST.president!=='junhyuk')return alert('카르벤(박준혁) 정책만 해당');ST.players.forEach(p=>{const tax=p.party==='강철방위당'?30:50;p.gold-=tax});save();renderPlayers();addBankLog('국방세 징수 (당원30G/일반50G)')}
function bulkBonus(){const sorted=[...ST.players].sort((a,b)=>netWorth(b)-netWorth(a));if(sorted.length){sorted[0].gold+=100;save();renderPlayers();addBankLog(sorted[0].name+' 1위 보너스 100G')}}
function bulkInterest(){ST.players.forEach(p=>{if(p.debt>0){const i=Math.ceil(p.debt*0.1/10)*10;p.debt+=i}});save();renderPlayers();addBankLog('이자 10% 일괄 적용')}
function bulkRedistribute(){if(ST.president!=='yeonwoo')return alert('장연우 정책만 해당');const sorted=[...ST.players].sort((a,b)=>netWorth(b)-netWorth(a));if(!sorted.length)return;const top=sorted[0];const take=Math.floor(netWorth(top)*0.1/10)*10;top.gold-=take;const share=Math.floor(take/ST.players.length/10)*10;ST.players.forEach(p=>{const mult=(p.party==='암흑이익당')?2:1;p.gold+=share*mult});save();renderPlayers();addBankLog('재분배: '+top.name+'에서 '+take+'G 회수 → 1인 '+share+'G')}

function renderPlayers(){
  const sorted=[...ST.players].sort((a,b)=>netWorth(b)-netWorth(a));
  const tb=document.getElementById('playerTable');
  tb.innerHTML=sorted.map((p,i)=>{
    const nw=netWorth(p);const sv=Object.entries(p.stocks||{}).reduce((s,[co,q])=>s+(ST.stocks[co]?.price||0)*q,0);
    const pc=p.party==='강철방위당'?'party-j':p.party==='혁신개발당'?'party-s':p.party==='암흑이익당'?'party-y':'';
    return `<tr><td>${i+1}</td><td>${p.name}</td><td class="${pc}">${p.party||'무소속'}</td><td class="r gold">${p.gold.toLocaleString()}</td><td class="r">${sv.toLocaleString()}</td><td class="r${p.debt>0?' neg':''}">${p.debt>0?'-'+p.debt.toLocaleString():0}</td><td class="r${nw<0?' neg':''}" style="font-weight:900">${nw.toLocaleString()}</td><td><button class="btn" onclick="editPlayer(${p.id})">수정</button> <button class="btn" onclick="removePlayer(${p.id})">삭제</button></td></tr>`}).join('');
  renderMiniSb(sorted);
}
function editPlayer(id){const p=ST.players.find(x=>x.id===id);if(!p)return;const g=prompt(p.name+' 골드 직접 설정:',p.gold);if(g!==null){p.gold=parseInt(g)||0;save();renderPlayers()}}
function removePlayer(id){if(!confirm('정말 삭제?'))return;ST.players=ST.players.filter(x=>x.id!==id);save();renderPlayers()}
function renderMiniSb(sorted){
  if(!sorted)sorted=[...ST.players].sort((a,b)=>netWorth(b)-netWorth(a));
  document.getElementById('miniSb').innerHTML=sorted.slice(0,8).map((p,i)=>{const nw=netWorth(p);return `<div class="mini-sb-row"><span class="mini-sb-rank">${i+1}</span><span class="mini-sb-name">${p.name}</span><span class="mini-sb-gold${nw<0?' neg':''}">${nw.toLocaleString()}G</span></div>`}).join('');
}

function addBankLog(msg){ST.bankLog.unshift('[R'+ST.round+'] '+msg);if(ST.bankLog.length>100)ST.bankLog.pop();save();document.getElementById('bankLog').innerHTML=ST.bankLog.map(l=>'<div class="log-entry">'+l+'</div>').join('')}
function updateLoanMax(){const p=getSelPlayer('loanPlayer');document.getElementById('loanMax').textContent=p?Math.max(0,Math.floor(netWorth(p)*0.5/100)*100)+'G':'—'}
function updateRepayInfo(){const p=getSelPlayer('repayPlayer');document.getElementById('repayDebt').textContent=p?p.debt+'G':'—'}
function doLoan(){const p=getSelPlayer('loanPlayer');if(!p)return;const amt=parseInt(document.getElementById('loanAmt').value)||0;if(amt<=0||amt%100!==0)return alert('100G 단위');const max=Math.floor(netWorth(p)*0.5/100)*100;if(amt>max)return alert('한도 초과: '+max+'G');p.gold+=amt;p.debt+=amt;save();renderPlayers();addBankLog(p.name+' 대출 '+amt+'G')}
function doRepay(){const p=getSelPlayer('repayPlayer');if(!p)return;const amt=parseInt(document.getElementById('repayAmt').value)||0;if(amt<=0)return;const actual=Math.min(amt,p.debt,p.gold);p.gold-=actual;p.debt-=actual;save();renderPlayers();addBankLog(p.name+' 상환 '+actual+'G')}
function doTransfer(){const from=getSelPlayer('txFrom'),to=getSelPlayer('txTo');if(!from||!to||from.id===to.id)return alert('다른 플레이어 선택');const amt=parseInt(document.getElementById('txAmt').value)||0;if(amt<=0||amt%100!==0)return alert('100G 단위');const feeExempt=from.party==='암흑이익당';const fee=feeExempt?0:Math.max(10,Math.ceil(amt*0.05/10)*10);if(from.gold<amt+fee)return alert('골드 부족');from.gold-=amt+fee;to.gold+=amt;save();renderPlayers();addBankLog(from.name+'→'+to.name+' '+amt+'G (수수료'+fee+'G)')}

    let boost=0;
    if(ST.president&&BOOST[ST.president]?.includes(s.sector))boost=Math.round(s.price*0.2/10)*10;
    if(ST.president&&NERF[ST.president]?.includes(s.sector))boost=-Math.round(s.price*0.1/10)*10;
    const newP=Math.max(0,s.price+curChg+boost);
    return `<tr><td>${n} (${SECTORS[s.sector]})</td><td class="r">${s.price}G</td><td class="r"><input type="number" id="${id}" value="${curChg}" step="10" style="width:70px" onchange="renderStocks()"></td><td class="r" style="color:${boost>0?'#6aff9a':boost<0?'#ff6b6b':'#555'}">${boost>0?'+':''}${boost}</td><td class="r gold">${newP}G</td></tr>`}).join('');
}
function applyStockChanges(){
  STOCK_NAMES.forEach(n=>{
    const s=ST.stocks[n];const id='chg_'+n.replace(/\s/g,'');
    const chg=parseInt(document.getElementById(id)?.value)||0;
    let boost=0;
    if(ST.president&&BOOST[ST.president]?.includes(s.sector))boost=Math.round(s.price*0.2/10)*10;
    if(ST.president&&NERF[ST.president]?.includes(s.sector))boost=-Math.round(s.price*0.1/10)*10;
    s.price=Math.max(10,s.price+chg+boost);
    s.history.push(s.price);
    document.getElementById(id).value=0;
  });
  save();renderStocks();renderPlayers();addBankLog('주가 변동 적용');
}
function doTrade(type){
  const p=getSelPlayer('tradePlayer');if(!p)return;
  const co=document.getElementById('tradeCo').value;if(!co)return;
  const qty=parseInt(document.getElementById('tradeQty').value)||1;
  const price=ST.stocks[co].price;
  if(type==='buy'){const cost=price*qty+10;if(p.gold<cost)return alert('골드 부족 ('+cost+'G 필요)');p.gold-=cost;p.stocks[co]=(p.stocks[co]||0)+qty;addBankLog(p.name+' '+co+' '+qty+'주 매수 ('+cost+'G)')}
  else{if((p.stocks[co]||0)<qty)return alert('보유 부족');p.stocks[co]-=qty;if(p.stocks[co]===0)delete p.stocks[co];p.gold+=price*qty;addBankLog(p.name+' '+co+' '+qty+'주 매도 ('+(price*qty)+'G)')}
  save();renderPlayers();
}
function sendStocks(){
  ch.postMessage({type:'stocks',data:{stocks:STOCK_NAMES.map(n=>({name:n,price:ST.stocks[n].price,history:ST.stocks[n].history}))}});
  document.getElementById('previewBox').innerHTML='주가 화면 표시 중';
}

// ═══════════════════════════════════════════
// [9] VOTE
// ═══════════════════════════════════════════
function addVote(k){ST.votes[k]++;save();renderVote()}
function resetVotes(){ST.votes={junhyuk:0,sangrin:0,yeonwoo:0,abstain:0};save();renderVote()}
function addImpeach(k){ST.impeachment[k]++;save();renderVote()}
function renderVote(){
  const t=ST.votes.junhyuk+ST.votes.sangrin+ST.votes.yeonwoo+ST.votes.abstain||1;
  const vd=document.getElementById('voteDisplay');
  vd.innerHTML=[['⚔️ 박준혁',ST.votes.junhyuk,'#6ab0ff'],['🧪 정상린',ST.votes.sangrin,'#6aff9a'],['🕷️ 장연우',ST.votes.yeonwoo,'#d06aff'],['기권',ST.votes.abstain,'#555']].map(([n,c,col])=>`<div class="form-row" style="margin:4px 0"><span style="width:80px;font-size:12px">${n}</span><div class="vote-bar-o"><div class="vote-bar-i" style="width:${c/t*100}%;background:${col}"></div></div><span style="width:40px;text-align:right;font-weight:700">${c}</span></div>`).join('');
  const it=ST.impeachment.keep+ST.impeachment.remove||1;
  document.getElementById('impeachDisplay').innerHTML=[['유지',ST.impeachment.keep,'#6aff9a'],['탄핵',ST.impeachment.remove,'#ff4444']].map(([n,c,col])=>`<div class="form-row" style="margin:4px 0"><span style="width:60px;font-size:12px">${n}</span><div class="vote-bar-o"><div class="vote-bar-i" style="width:${c/it*100}%;background:${col}"></div></div><span style="width:40px;text-align:right;font-weight:700">${c}</span></div>`).join('');
}
function sendVoteElection(){
  ch.postMessage({type:'vote',data:{title:'초대 대통령 선거',candidates:[{name:'박준혁',count:ST.votes.junhyuk},{name:'정상린',count:ST.votes.sangrin},{name:'장연우',count:ST.votes.yeonwoo},{name:'기권',count:ST.votes.abstain}]}});
}
function sendVoteImpeach(){
  ch.postMessage({type:'vote',data:{title:'탄핵 투표',candidates:[{name:'유지',count:ST.impeachment.keep},{name:'탄핵',count:ST.impeachment.remove}]}});
}

// ═══════════════════════════════════════════
// [10] BETTING
// ═══════════════════════════════════════════
function addBetLog(msg){ST.betLog.unshift(msg);if(ST.betLog.length>50)ST.betLog.pop();save();document.getElementById('betLog').innerHTML=ST.betLog.map(l=>'<div class="log-entry">'+l+'</div>').join('')}
function placeHorseBet(){const p=getSelPlayer('hrPlayer');if(!p)return;const h=parseInt(document.getElementById('hrHorse').value);const amt=parseInt(document.getElementById('hrAmt').value)||100;if(p.gold<amt)return alert('골드 부족');p.gold-=amt;ST.horseBets.push({pid:p.id,name:p.name,horse:h,amt});save();renderPlayers();renderHorseBets();addBetLog(p.name+' 경마 '+h+'번말 '+amt+'G')}
function renderHorseBets(){document.getElementById('horseBets').innerHTML=ST.horseBets.map(b=>`<div style="font-size:11px;color:#888">${b.name}: ${b.horse}번말 ${b.amt}G</div>`).join('')}
function settleHorse(){const w=parseInt(document.getElementById('hrWinner').value);ST.horseWinner=w;const mult=[0,2,3,5,10];ST.horseBets.forEach(b=>{const p=ST.players.find(x=>x.id===b.pid);if(!p)return;if(b.horse===w){p.gold+=b.amt*mult[w];addBetLog('🏇 '+b.name+' 당첨! +'+(b.amt*mult[w])+'G')}else{addBetLog('🏇 '+b.name+' 낙첨')}});ST.horseBets=[];save();renderPlayers();renderHorseBets()}
function sendHorse(){ch.postMessage({type:'horse',data:{winner:ST.horseWinner||1}})}
function settleGamble(){const p=getSelPlayer('gePlayer');if(!p)return;const choice=document.getElementById('geChoice').value;const result=document.getElementById('geResult').value;const amt=parseInt(document.getElementById('geAmt').value)||100;if(choice===result){p.gold+=amt;addBetLog('🎰 '+p.name+' 적중! +'+amt+'G')}else{p.gold-=amt;addBetLog('🎰 '+p.name+' 실패 -'+amt+'G')}save();renderPlayers()}
function drawLottery(){const p=getSelPlayer('lotPlayer');if(!p)return;if(p.gold<50)return alert('골드 부족');p.gold-=50;const r=Math.random();let prize=0,label='❌ 꽝';if(r<0.05){prize=500;label='🥇 1등! 500G'}else if(r<0.20){prize=200;label='🥈 2등! 200G'}else if(r<0.50){prize=100;label='🥉 3등! 100G'}p.gold+=prize;save();renderPlayers();document.getElementById('lotResult').innerHTML=`<span style="color:${prize>0?'#f0c040':'#ff4444'}">${p.name}: ${label}</span>`;addBetLog('🎟️ '+p.name+' 복권 → '+label)}

// ═══════════════════════════════════════════
// [11] TIMER
// ═══════════════════════════════════════════
let timerSec=300,timerInt=null;
function updateTimer(){const m=Math.floor(timerSec/60),s=timerSec%60;const txt=m+':'+String(s).padStart(2,'0');const el=document.getElementById('timerDisp');el.textContent=txt;el.classList.toggle('urgent',timerSec<=10);if(presentMode==='timer')sendTimerToPresent()}
function sendTimerToPresent(){ch.postMessage({type:'timer',data:{seconds:timerSec,running:!!timerInt}})}
function startTimer(sec){stopTimer();timerSec=sec;updateTimer();timerInt=setInterval(()=>{timerSec--;updateTimer();if(timerSec<=0)stopTimer()},1000)}
function stopTimer(){if(timerInt){clearInterval(timerInt);timerInt=null}}

// ═══════════════════════════════════════════
// [12] SCOREBOARD
// ═══════════════════════════════════════════
function sendScoreboard(){
  const sorted=[...ST.players].sort((a,b)=>netWorth(b)-netWorth(a));
  ch.postMessage({type:'scoreboard',data:{players:sorted.map(p=>({name:p.name,netWorth:netWorth(p),party:p.party||''}))}});
  document.getElementById('previewBox').innerHTML='순위표 표시 중';
}

// ═══════════════════════════════════════════
// [13] HELPERS
// ═══════════════════════════════════════════
function getSelPlayer(selId){const sel=document.getElementById(selId);const id=parseInt(sel?.value);return ST.players.find(p=>p.id===id)}
function refreshDropdowns(){
  ['loanPlayer','repayPlayer','txFrom','txTo','tradePlayer','hrPlayer','gePlayer','lotPlayer'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const cur=el.value;
    el.innerHTML=ST.players.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    if(cur)el.value=cur;
  });
  const tco=document.getElementById('tradeCo');
  if(tco)tco.innerHTML=STOCK_NAMES.map(n=>`<option value="${n}">${n}</option>`).join('');
  if(document.getElementById('presidentSel'))document.getElementById('presidentSel').value=ST.president||'';
}

// ═══════════════════════════════════════════
// [14] KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goCue(curCue+1)}
  if(e.key==='ArrowLeft'){e.preventDefault();goCue(curCue-1)}
  if(e.key==='b'||e.key==='B')sendBlack();
  if(e.key==='t'||e.key==='T')startTimer(300);
  if(e.key==='s'||e.key==='S')stopTimer();
});

// ═══════════════════════════════════════════
// [15] INIT
// ═══════════════════════════════════════════
load();
buildCues();
renderPlayers();
renderStocks();
renderVote();
renderHorseBets();
refreshDropdowns();
updateTimer();
document.getElementById('bankLog').innerHTML=ST.bankLog.map(l=>'<div class="log-entry">'+l+'</div>').join('');
document.getElementById('betLog').innerHTML=ST.betLog.map(l=>'<div class="log-entry">'+l+'</div>').join('');
</script>
